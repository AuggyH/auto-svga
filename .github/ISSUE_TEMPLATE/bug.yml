name: Product defect
description: Report a reproducible Auto SVGA product or packaging defect.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not upload production assets, private paths, credentials, or long logs. Use a redacted material alias.
  - type: input
    id: build
    attributes:
      label: Build identity
      description: Product version, commit, or package manifest identity.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - S0 Blocker
        - S1 High
        - S2 Medium
        - S3 Low
    validations:
      required: true
  - type: input
    id: material
    attributes:
      label: Material alias
      description: A redacted alias only, or "not applicable".
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Minimal numbered steps and reproduction rate.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Bounded evidence
      description: Short error excerpt, redacted evidence reference, or screenshot description.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy boundary
      options:
        - label: I removed production assets, credentials, private paths, and unnecessary logs.
          required: true
