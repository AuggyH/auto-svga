name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.12.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install desktop prototype dependencies
        run: npm ci --prefix tools/electron-prototype

      - name: Reject newly tracked production asset formats
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          disallowed="$(git diff --diff-filter=AM --name-only "$BASE_SHA" "$GITHUB_SHA" |
            grep -Ei '\.(fig|gif|jpe?g|mov|mp4|png|psd|sketch|svga|webm)$' |
            grep -Ev '^(examples|fixtures)/' || true)"
          if [ -n "$disallowed" ]; then
            printf 'New production-asset formats must stay outside Git:\n%s\n' "$disallowed"
            exit 1
          fi

      - name: Run full validation gate
        run: npm run loop:validate
