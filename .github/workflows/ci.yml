name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.12.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install desktop prototype dependencies
        run: npm ci --prefix tools/electron-prototype

      - name: Install preview runtime dependency
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew install ffmpeg
          fi

      - name: Reject newly tracked production asset formats
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          disallowed="$(git diff --diff-filter=AM --name-only "$BASE_SHA" "$GITHUB_SHA" |
            grep -Ei '\.(fig|gif|jpe?g|mov|mp4|png|psd|sketch|svga|webm)$' |
            grep -Ev '^(examples|fixtures)/' || true)"
          if [ -n "$disallowed" ]; then
            printf 'New production-asset formats must stay outside Git:\n%s\n' "$disallowed"
            exit 1
          fi

      - name: Run full validation gate
        run: npm run loop:validate
