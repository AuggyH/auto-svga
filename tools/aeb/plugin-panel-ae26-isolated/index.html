<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Auto SVGA AEB Dev 26.3</title>
    <script>
      window.__AUTO_SVGA_AEB_PANEL_BOOTSTRAP__ = Object.freeze({
        source: "plugin-panel-ae26-isolated/index.html",
        profile: "ae26-isolated",
        extensionId: "local.auto-svga.aeb.panel.ae26.dev.export"
      });
    </script>
    <script src="./js/aeb-panel.js"></script>
    <style>
      body {
        background: #202124;
        color: #f3f4f6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
      }

      label,
      input,
      button,
      pre {
        box-sizing: border-box;
        display: block;
        width: 100%;
      }

      input,
      button {
        border: 1px solid #5f6368;
        border-radius: 4px;
        min-height: 32px;
      }

      input {
        background: #111315;
        color: #f3f4f6;
        margin: 8px 0 12px;
        padding: 6px 8px;
      }

      button {
        background: #8ab4f8;
        color: #111315;
        cursor: pointer;
        font-weight: 600;
      }

      pre {
        background: #111315;
        border: 1px solid #3c4043;
        border-radius: 4px;
        min-height: 120px;
        overflow: auto;
        padding: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <label for="aeb-output-folder">AEB output folder</label>
    <input id="aeb-output-folder" type="text" value="{PILOT_ROOT}/ae-export-package">
    <button id="aeb-scratch-prepare-button" type="button">Prepare Pilot Scratch</button>
    <button id="aeb-export-button" type="button">Export to Auto SVGA</button>
    <pre id="aeb-status" aria-live="polite">Idle</pre>
  </body>
</html>
