<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto SVGA Compare Empty Direction</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="asvPreviewDirection" aria-label="Auto SVGA 对比空态静态方向稿">
      <section class="asvPreviewWindow">
        <section class="asvPreviewCanvas asvCompareCanvas">
          <div class="asvTrafficLights" aria-hidden="true">
            <span class="asvTraffic asvTrafficClose"></span>
            <span class="asvTraffic asvTrafficMin"></span>
            <span class="asvTraffic asvTrafficMax"></span>
          </div>

          <div class="asvCompareSlots">
            <div class="asvCompareDrop">
              <div class="asvDropIcon" aria-hidden="true">
                <svg viewBox="0 0 28 28">
                  <path d="M14 4v13" />
                  <path d="M9 9l5-5 5 5" />
                  <path d="M7 16v5h14v-5" />
                </svg>
              </div>
              <div class="asvDropText">拖拽文件到此处</div>
              <div class="asvOpenButton">
                <svg viewBox="0 0 28 28" aria-hidden="true">
                  <path d="M4.5 9.5h7l2 3h10v9h-19z" />
                  <path d="M4.5 9.5v-3h6.5l2 3" />
                </svg>
                <span>打开文件</span>
              </div>
            </div>

            <div class="asvCompareDrop">
              <div class="asvDropIcon" aria-hidden="true">
                <svg viewBox="0 0 28 28">
                  <path d="M14 4v13" />
                  <path d="M9 9l5-5 5 5" />
                  <path d="M7 16v5h14v-5" />
                </svg>
              </div>
              <div class="asvDropText">拖拽文件到此处</div>
              <div class="asvOpenButton">
                <svg viewBox="0 0 28 28" aria-hidden="true">
                  <path d="M4.5 9.5h7l2 3h10v9h-19z" />
                  <path d="M4.5 9.5v-3h6.5l2 3" />
                </svg>
                <span>打开文件</span>
              </div>
            </div>
          </div>

          <div class="asvPlayerControls isDisabled" aria-label="播放控制">
            <span class="asvControlIcon asvReplayIcon"></span>
            <span class="asvPlayButton"></span>
            <span class="asvProgress"><span></span></span>
            <span class="asvTime">0:00 / 0:02</span>
            <span class="asvControlIcon asvLoopIcon"></span>
            <span class="asvControlIcon asvFullscreenIcon"></span>
          </div>
        </section>

        <aside class="asvPreviewSidebar" aria-label="对比信息">
          <header class="asvSidebarHeader">
            <h1>对比模式</h1>
            <span class="asvSaveButton">退出对比</span>
          </header>
          <div class="asvCompareNames">
            <strong>未打开文件</strong>
            <strong>未打开文件</strong>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
