<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto SVGA Edit Direction</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="asvPreviewDirection" aria-label="Auto SVGA 编辑模式静态方向稿">
      <section class="asvEditWindow">
        <aside class="asvLayerSidebar" aria-label="图层列表">
          <div class="asvTrafficLights" aria-hidden="true">
            <span class="asvTraffic asvTrafficClose"></span>
            <span class="asvTraffic asvTrafficMin"></span>
            <span class="asvTraffic asvTrafficMax"></span>
          </div>
          <h1>战狼头像框.svga *</h1>
          <section class="asvLayerList">
            <h2>图层列表</h2>
            <div class="asvLayerFilters">
              <span>全部</span>
              <span>图片</span>
              <span>光效</span>
              <span>粒子</span>
            </div>
            <div class="asvLayerRow isSelected">
              <span class="asvAssetPreviewThumb"></span>
              <strong>图层名字</strong>
              <em>已绑定对称图层</em>
            </div>
            <div class="asvLayerRow isMuted">
              <span class="asvAssetPreviewThumb"></span>
              <strong>图层名字</strong>
            </div>
            <div class="asvLayerRow">
              <span class="asvAssetPreviewThumb"></span>
              <strong>图层名字</strong>
            </div>
            <div class="asvLayerRow isMuted">
              <span class="asvAssetPreviewThumb"></span>
              <strong>图层名字</strong>
            </div>
            <div class="asvLayerRow">
              <span class="asvAssetPreviewThumb"></span>
              <strong>图层名字</strong>
            </div>
          </section>
        </aside>

        <section class="asvPreviewCanvas">
          <div class="asvModeSwitch" aria-label="模式切换">
            <span>预览模式</span>
            <span class="isSelected">编辑模式</span>
          </div>
          <div class="asvWolfFrame" aria-label="SVGA 画面预览">
            <span class="asvWolfTop"></span>
            <span class="asvWolfSide asvWolfLeft"></span>
            <span class="asvWolfSide asvWolfRight"></span>
            <span class="asvWolfBottom"></span>
            <span class="asvWolfGem"></span>
            <span class="asvWolfHead asvWolfHeadLeft"></span>
            <span class="asvWolfHead asvWolfHeadRight"></span>
            <span class="asvWolfCenter"></span>
          </div>
          <div class="asvPlayerControls" aria-label="播放控制">
            <span class="asvControlIcon asvReplayIcon"></span>
            <span class="asvPlayButton"></span>
            <span class="asvProgress"><span></span></span>
            <span class="asvTime">0:00 / 0:02</span>
            <span class="asvControlIcon asvLoopIcon"></span>
            <span class="asvControlIcon asvFullscreenIcon"></span>
          </div>
        </section>

        <aside class="asvReservedPane" aria-label="属性编辑占位"></aside>
      </section>
    </main>
  </body>
</html>
