<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto SVGA Preview Dark Direction</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="asvThemeDark">
    <main class="asvPreviewDirection" aria-label="Auto SVGA 暗色预览页静态方向稿">
      <section class="asvPreviewWindow">
        <section class="asvPreviewCanvas">
          <div class="asvTrafficLights" aria-hidden="true">
            <span class="asvTraffic asvTrafficClose"></span>
            <span class="asvTraffic asvTrafficMin"></span>
            <span class="asvTraffic asvTrafficMax"></span>
          </div>

          <div class="asvModeSwitch" aria-label="模式切换">
            <span class="isSelected">预览模式</span>
            <span>编辑模式</span>
          </div>

          <div class="asvWolfFrame" aria-label="SVGA 画面预览">
            <span class="asvWolfTop"></span>
            <span class="asvWolfSide asvWolfLeft"></span>
            <span class="asvWolfSide asvWolfRight"></span>
            <span class="asvWolfBottom"></span>
            <span class="asvWolfGem"></span>
            <span class="asvWolfHead asvWolfHeadLeft"></span>
            <span class="asvWolfHead asvWolfHeadRight"></span>
            <span class="asvWolfCenter"></span>
          </div>

          <div class="asvPlayerControls" aria-label="播放控制">
            <span class="asvControlIcon asvReplayIcon"></span>
            <span class="asvPlayButton"></span>
            <span class="asvProgress"><span></span></span>
            <span class="asvTime">0:00 / 0:02</span>
            <span class="asvControlIcon asvLoopIcon"></span>
            <span class="asvControlIcon asvFullscreenIcon"></span>
          </div>
        </section>

        <aside class="asvPreviewSidebar" aria-label="文件信息">
          <header class="asvSidebarHeader">
            <h1>战狼头像框.svga *</h1>
            <span class="asvSaveButton">另存为</span>
          </header>

          <section class="asvMetricGrid">
            <div>
              <span>文件体积</span>
              <strong>2.4 <em>MiB</em></strong>
              <b>可优化</b>
            </div>
            <div>
              <span>内存占用</span>
              <strong>20.6 <em>MiB</em></strong>
              <b>可优化</b>
            </div>
            <div>
              <span>动画时长</span>
              <strong>3 <em>s</em></strong>
            </div>
            <div>
              <span>帧率</span>
              <strong>30 <em>fps</em></strong>
            </div>
            <div>
              <span>画布尺寸</span>
              <strong>300 x 300 <em>px</em></strong>
            </div>
          </section>

          <section class="asvImageKeyBlock">
            <h2>imageKey（4）</h2>
            <div class="asvImageKeyRows">
              <div class="asvImageKeyRow">
                <span class="asvKeyThumb asvKeyThumbText"></span>
                <strong>username</strong>
                <span class="asvEditGlyph"></span>
                <span class="asvKeyAction asvTextInput">123456789</span>
                <span class="asvResetGlyph"></span>
              </div>
              <div class="asvImageKeyRow">
                <span class="asvKeyThumb asvKeyThumbText"></span>
                <strong>id</strong>
                <span class="asvEditGlyph"></span>
                <span class="asvKeyAction asvTextInput isPlaceholder">输入文字以预览</span>
              </div>
              <div class="asvImageKeyRow">
                <span class="asvKeyThumb asvKeyThumbAvatar"></span>
                <strong>avatar</strong>
                <span class="asvEditGlyph"></span>
                <span class="asvKeyAction isBlue">替换图片</span>
                <span class="asvResetGlyph"></span>
              </div>
            </div>
          </section>
        </aside>
      </section>
    </main>
  </body>
</html>
