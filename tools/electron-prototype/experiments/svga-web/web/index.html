<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="auto-svga-csp" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' blob:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
    <title>Auto SVGA</title>
    <link rel="stylesheet" href="./short-term-macos.tokens.css">
    <link rel="stylesheet" href="./short-term-macos.atoms.css">
    <link rel="stylesheet" href="./short-term-macos.molecules.css">
    <link rel="stylesheet" href="./short-term-macos.components.css">
    <link rel="stylesheet" href="./short-term-macos.modules.css">
    <link rel="stylesheet" href="./short-term-macos.page-states.css">
    <link rel="stylesheet" href="./short-term-macos.css">
  </head>
  <body>
    <main class="macApp" data-app-state="launch">
      <header class="titlebar" aria-label="窗口区域" data-component="WindowChrome">
        <div class="windowControlSpace" aria-hidden="true"></div>
      </header>

      <section class="saveBanner" id="saveBanner" aria-live="polite" hidden></section>

      <section class="view launchView isActive" data-view="launch" aria-label="启动" data-page-state="Launch" data-module="LaunchModule">
        <div class="launchCanvas" id="dropZone" data-component="LaunchDropCanvas">
          <div class="launchPrompt">
            <p>拖入 SVGA 文件</p>
            <button class="largeOpenButton" type="button" data-action="open">打开文件</button>
          </div>
          <section class="recentBlock" aria-label="最近打开" data-component="LaunchRecentFilesList">
            <div class="recentHeader">
              <h2>最近打开</h2>
              <button type="button" data-action="clear-recent">清除记录</button>
            </div>
            <ol id="recentList"></ol>
            <p class="recentNote" id="recentNote" hidden></p>
          </section>
        </div>
      </section>

      <section class="view stateView" data-view="loading" aria-live="polite" data-page-state="Loading" hidden>
        <div class="stateCard" data-component="FileDropTarget">
          <span class="spinner" aria-hidden="true"></span>
          <h1>正在打开 SVGA</h1>
          <p id="loadingMessage">读取文件并准备预览。</p>
        </div>
      </section>

      <section class="view stateView" data-view="failed" data-page-state="Load failed" hidden>
        <div class="stateCard error" data-component="ErrorRecoveryPanel">
          <h1>无法打开这个 SVGA</h1>
          <p id="errorMessage">文件未能解析，源文件没有被修改。</p>
          <button class="toolbarButton primary" type="button" data-action="open">打开文件</button>
        </div>
      </section>

      <section class="view previewView" data-view="preview" data-page-state="Preview ready" hidden>
        <section class="previewStagePanel" aria-label="SVGA 预览" data-module="PreviewCanvasModule" data-component="PreviewStage">
          <div class="canvasModeSwitch" role="group" aria-label="模式" data-component="CanvasModeSwitch">
            <button type="button" class="isSelected" data-action="mode-preview" aria-pressed="true">预览模式</button>
            <button type="button" data-action="mode-edit" aria-pressed="false">编辑模式</button>
          </div>
          <div class="canvasWrap" id="primaryCanvasWrap" data-canvas-label="预览">
            <canvas id="primaryCanvas" aria-label="SVGA 预览画布"></canvas>
            <div class="runtimeOverlay" id="runtimeTextOverlay" hidden></div>
          </div>
          <div class="playbackBar" aria-label="播放控制" data-component="PlaybackControls">
            <div class="playbackActions" data-component="PlaybackButtonGroup">
              <button type="button" data-action="play-pause">播放</button>
              <button type="button" data-action="replay">重播</button>
            </div>
            <span class="playbackMeta" id="playbackMeta" aria-live="polite" data-component="InlineStatus">-</span>
          </div>
        </section>

        <aside class="rightPanel" aria-label="信息" data-component="RightInformationSurface">
          <div class="rightSurfaceHeader">
            <h1 class="fileIdentity" id="fileIdentity">等待打开文件</h1>
            <div class="toolbarCluster toolbarClusterSave" data-component="SaveButtonPair">
              <button class="toolbarButton" type="button" data-action="save-overwrite" disabled title="没有可保存的输出" aria-keyshortcuts="Meta+S">覆盖保存</button>
              <button class="toolbarButton primary" type="button" data-action="save-as" disabled title="没有可保存的输出" aria-keyshortcuts="Meta+Shift+S">另存为</button>
            </div>
          </div>
          <section class="rightSurfaceBody isActive" id="panelOverview" data-panel="overview" tabindex="0" aria-label="文件信息" data-module="OverviewInformationModule">
            <section class="factGrid" id="factGrid" aria-label="文件信息" data-component="OverviewFactRow"></section>
            <section class="replaceableSection" data-component="ReplaceableImageRow" aria-labelledby="replaceableHeading" tabindex="-1">
              <div class="sectionHead">
                <h2 id="replaceableHeading">imageKey <span id="replaceableSummary"></span></h2>
              </div>
              <div class="replaceableList" id="replaceableList" role="listbox" aria-label="imageKey"></div>
              <menu class="contextMenu" id="resourceContextMenu" role="menu" tabindex="-1" hidden>
                <button type="button" role="menuitem" data-action="context-rename">重命名 imageKey</button>
                <button type="button" role="menuitem" data-action="context-replace">替换预览图片</button>
                <button type="button" role="menuitem" data-action="context-reset">重置预览图片</button>
              </menu>
            </section>
            <section class="textPreviewBlock" aria-labelledby="textPreviewHeading">
              <div class="sectionHead">
                <h3 id="textPreviewHeading">运行时文本 <span id="textPreviewSummary"></span></h3>
              </div>
              <div class="textElementList" id="textElementList" role="listbox" aria-label="运行时文本"></div>
            </section>
            <section class="assetSection" data-component="AssetRow">
              <h2>资源</h2>
              <div class="assetList" id="assetList"></div>
            </section>
          </section>

          <section class="rightSurfaceBody" id="panelOptimization" data-panel="optimization" tabindex="0" aria-label="优化" data-module="OptimizationDetailSurface" hidden>
            <div class="sectionHead">
              <div>
                <h2>优化</h2>
                <p id="optimizationSummary"></p>
              </div>
              <button class="toolbarButton primary" type="button" data-action="run-optimization">执行安全优化</button>
            </div>
            <div class="findingList" id="findingList"></div>
          </section>
        </aside>
      </section>

      <section class="view compareView" data-view="compare" data-page-state="General comparing" data-module="GeneralCompareModule" hidden>
        <section class="compareStage">
          <div class="compareCanvasWrap" id="compareCanvasWrapA" data-component="ComparePreviewCard" data-compare-label="A" data-compare-state="empty">
            <header class="compareCanvasHeader">
              <span>A</span>
              <strong id="compareCanvasTitleA">A 文件</strong>
              <small id="compareCanvasMetaA"></small>
            </header>
            <canvas id="compareCanvasA" aria-label="A 文件预览"></canvas>
          </div>
          <div class="compareCanvasWrap" id="compareCanvasWrapB" data-component="ComparePreviewCard" data-compare-label="B" data-compare-state="empty">
            <header class="compareCanvasHeader">
              <span>B</span>
              <strong id="compareCanvasTitleB">B 文件</strong>
              <small id="compareCanvasMetaB"></small>
            </header>
            <canvas id="compareCanvasB" aria-label="B 文件预览"></canvas>
          </div>
        </section>
        <aside class="compareInfo" id="compareInfoB" data-component="RightInformationSurface">
          <button class="toolbarButton primary" type="button" data-action="open-compare-b">打开 B 文件</button>
          <button class="toolbarButton" type="button" data-action="back-preview">退出对比</button>
        </aside>
      </section>

      <section class="view editView" data-view="edit" data-page-state="Edit reserved" data-module="EditReservedModule" hidden>
        <aside class="layerPanel" id="layerPanel"></aside>
        <section class="previewStagePanel">
          <div class="canvasModeSwitch" role="group" aria-label="模式" data-component="CanvasModeSwitch">
            <button type="button" data-action="mode-preview" aria-pressed="false">预览模式</button>
            <button type="button" class="isSelected" data-action="mode-edit" aria-pressed="true">编辑模式</button>
          </div>
          <div class="canvasWrap"><canvas id="editCanvas" aria-label="编辑预留预览"></canvas></div>
        </section>
        <aside class="reservedPanel" data-component="ReservedOperationPanel">
          <p class="emptyText reservedNotice">短期版仅保留图层查看。</p>
        </aside>
      </section>
    </main>

    <dialog class="appDialog" id="discardDialog" data-component="ErrorRecoveryPanel" data-status="warning">
      <form method="dialog" class="dialogBody">
        <header class="dialogHeader">
          <h2>放弃未保存输出？</h2>
          <p id="discardMessage">当前有未保存的 SVGA 输出。</p>
        </header>
        <menu class="dialogActions">
          <button value="cancel">取消</button>
          <button class="danger" value="confirm">放弃</button>
        </menu>
      </form>
    </dialog>

    <dialog class="appDialog settingsDialog" id="settingsDialog" data-component="SettingsSheet" data-status="info">
      <form method="dialog" class="dialogBody">
        <header class="dialogHeader">
          <h2>设置</h2>
        </header>
        <fieldset class="settingsGroup" aria-label="外观">
          <legend>外观</legend>
          <label class="settingsChoice"><input type="radio" name="appearance" value="system" data-appearance-choice>跟随系统</label>
          <label class="settingsChoice"><input type="radio" name="appearance" value="light" data-appearance-choice>浅色</label>
          <label class="settingsChoice"><input type="radio" name="appearance" value="dark" data-appearance-choice>深色</label>
        </fieldset>
        <menu class="dialogActions">
          <button value="close" data-action="close-settings">完成</button>
        </menu>
      </form>
    </dialog>

    <input id="replacementFileInput" type="file" accept="image/png,.png" hidden>
    <script src="/legacy-vendor/pako-2.1.0.min.js"></script>
    <script type="module" src="./short-term-macos-app.mjs"></script>
  </body>
</html>
